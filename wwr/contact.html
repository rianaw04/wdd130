<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Contact Us - Wild Rafters</title>
        <meta name="description" content="Find the contact information for Wild Rafters here.">
        <meta name="author" content="Riana Warner">
        <link rel="stylesheet" href="styles/rafting.css">
        <link rel="stylesheet" href="styles/site-plan-rafting.css">
        <link rel="stylesheet" href="styles/contact.css">
    </head>

    <body>
        <header class="header">
            <img class="logo" src="images/circlelogo.jpeg">
            <nav class="headerbuttons">
                <a class="homebutton" href="#">Home</a>
                <a class="aboutbutton" href="#">About</a>
                <a class="tripsbutton" href="#">Trips</a>
                <a class="contactbutton" href="#">Contact</a>
            </nav>
        </header>

        <p></p>
        <hr>
        <p></p>

        <main>
            <div>
                <h1 class="name"> Wild Rafters</h1>
            </div>
           
            <div class="contactinfo">
                <div class="info1">
                    <h1>Get In Touch</h1>
                </div>
                <div class="info1">
                    <h3>Contact us by email or phone today for a speedy response!</h3>
                </div>
            </div>
            <div class="contacts">
                <div class="contactus">
                    <div class="phone">
                        <h3 class="number"> &#9742 (268) 462 7845</h3>
                    </div>
                    <div class="email">
                        <h3>&#9993; wildraft23@gmail.com</h3>
                    </div>
                </div>
            </div>

            <div class="container">
                <form>
                    <fieldset class="form">
                        <label for="q1">Enter Your Username</label>
                        <input class="q1" type="text" name="username" id="username"> 
                        
                        <label for="q2">Enter Your Email Adress</label>
                        <input class="q2" type="text" name="email" id="email">
                        
                        <label class="q3" for="genmessage">Describe The Message</label>
                        <select class="q3" id="genmessage" name="genmessage">
                            <input type="radio" id="q3" name="q3" value="General Inquiry">General Inquiry</option>
                            <option value="Reservation Question">Reservation Question</option>
                            <option value="Website Suggestion">Website Suggestion</option>
                        </select>
                        
                        <label for="q4">Enter The Message Here</label>
                        <textarea class="q4" name="message" id="message" rows="1" cols="50"></textarea>
                        
                        <label class="q5" for="myCheckbox">Please Subscribe Me To The Monthly Newsletter</label>
                        <input type="checkbox" id="myCheckbox" name="checkboxName" value="checkboxValue">

                        <hr class="line2">
                        <button class="submitbutton" type="submit">Submit</button>
                    </fieldset>
                </form>

                <div class="map">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d15255.960155700694!2d-61.85815176189009!3d17.071058782228178!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sag!4v1698201903477!5m2!1sen!2sag" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>

        </main>

        
        <footer class="bottom">
            <nav class="socials">
                <a href="https://www.facebook.com">
                    <img class="facebook" src="images/icons8-facebook-30.png">
                </a>
                <a href="https://twitter.com/">
                    <img class="twitter" src="images/icons8-twitter-50.png">
                </a>
                <a href="https://www.instagram.com/">
                    <img class="insta" src="images/icons8-instagram-24.png">
                </a>
            </nav>
            © 2023 🐙Wild Rafters🐙 Riana Warner 🐙 
       </footer>

    </body>

</html>
